version: "3"

dotenv: [".env"]

tasks:
  build:
    cmds:
      - task: amd
        vars:
          VERSION: latest
      - say -v Samantha "The Docker build is complete."

  amd:
    internal: true
    dir: app
    cmds:
      - |
        docker buildx build \
          --builder ${AMD64_BUILDER} \
          --platform linux/amd64 \
          --build-arg apt_cacher=${APT_CACHER} \
          --push -t ${REGISTRY}/${APP_NAME}:{{.VERSION}} .
      - ssh ${REMOTE_HOST} "docker pull ${REGISTRY}/${APP_NAME}:{{.VERSION}}"
    silent: true

  arm:
    internal: true
    dir: app
    cmds:
      - |
        docker buildx build \
          --platform linux/arm64 \
          --build-arg apt_cacher=${APT_CACHER} \
          --push -t ${REGISTRY}/${APP_NAME}:{{.VERSION}} .
    silent: true
