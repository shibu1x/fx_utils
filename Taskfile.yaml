version: "3"

dotenv: [".env"]

tasks:
  build:
    cmds:
      - task: amd
      - task: arm
      - docker buildx imagetools create -t ${REGISTRY}/${APP_NAME}:latest ${REGISTRY}/${APP_NAME}:amd ${REGISTRY}/${APP_NAME}:arm
      - ssh ${DEPLOY_HOST} "docker pull ${REGISTRY}/${APP_NAME}:latest"
      - say -v Samantha "The Docker build is complete."

  amd:
    internal: true
    dir: app
    cmds:
      - |
        docker buildx build \
          --builder ${AMD64_BUILDER} \
          --platform linux/amd64 \
          --push \
          -t ${REGISTRY}/${APP_NAME}:amd .
    silent: true

  arm:
    internal: true
    dir: app
    cmds:
      - |
        docker buildx build \
          --platform linux/arm64 \
          --push \
          -t ${REGISTRY}/${APP_NAME}:arm .
    silent: true

  pos:
    cmds:
      - docker compose run --rm dev python position_analysis.py
